site_name: iLab Maker Journal
site_url: https://basheerbk.github.io/MakerLog
site_description: A personal log of mentoring sessions and maker projects at iLab

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - blog:
      blog_toc: true
      post_readtime: true
  - search

nav:
  - Home: index.md
  - Journal:
    - blog/index.md
  - About: about.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
